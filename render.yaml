databases:
  - name: n8n-db
    databaseName: n8ndb
    user: n8n
    plan: free

services:
  # ─────────────────────────────────────────────
  # 1. Redis Cache & Queue
  # ─────────────────────────────────────────────
  - type: pserv
    name: redis
    env: image
    image: redis:alpine
    plan: free

  # ─────────────────────────────────────────────
  # 2. n8n Enterprise Engine (Main)
  # ─────────────────────────────────────────────
  - type: web
    name: n8n-automation-engine
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: N8N_PORT
        value: "5678"
      - key: PORT
        value: "5678"
      - key: EXECUTIONS_MODE
        value: queue
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: QUEUE_BULL_REDIS_HOST
        fromService:
          type: pserv
          name: redis
          envVarKey: RENDER_INTERNAL_HOSTNAME
      - key: QUEUE_BULL_REDIS_PORT
        value: "6379"
      - key: WEBHOOK_URL
        value: https://n8n-automation-engine.onrender.com/
      - key: GENERIC_TIMEZONE
        value: UTC

  # ─────────────────────────────────────────────
  # 3. n8n Enterprise Worker
  # ─────────────────────────────────────────────
  - type: worker
    name: n8n-worker
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: "n8n worker"
    envVars:
      - key: EXECUTIONS_MODE
        value: queue
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: QUEUE_BULL_REDIS_HOST
        fromService:
          type: pserv
          name: redis
          envVarKey: RENDER_INTERNAL_HOSTNAME
      - key: QUEUE_BULL_REDIS_PORT
        value: "6379"
      - key: GENERIC_TIMEZONE
        value: UTC

  # ─────────────────────────────────────────────
  # 4. WAHA (WhatsApp API)
  # ─────────────────────────────────────────────
  - type: web
    name: waha-whatsapp-api
    env: image
    image: devlikeapro/waha:latest
    plan: free
    envVars:
      - key: WAHA_PRINT_QR
        value: "True"
      - key: WAHA_LOG_LEVEL
        value: "info"
