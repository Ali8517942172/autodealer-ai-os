services:
  # ==========================================
  # AutoDealer AI OS - Executive Dashboard (Main UI)
  # Port 5005 - The unified interface for ALL modules
  # ==========================================
  executive-dashboard:
    build:
      context: ./apps/executive-dashboard
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    environment:
      - NODE_ENV=production
      - CRM_API_URL=http://crm-backend:5000
      - MARKETING_API_URL=http://marketing-os:5001
      - INVENTORY_API_URL=http://inventory-intel:5003
      - ODOO_API_URL=http://odoo-integration:5004
    depends_on:
      - crm-backend
      - marketing-os
      - inventory-intel
      - odoo-integration
    restart: always

  # ==========================================
  # CRM Backend API (Port 5000)
  # ==========================================
  crm-backend:
    build:
      context: ./apps/ai-crm/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    restart: always

  # ==========================================
  # Marketing Intelligence OS (Port 5001)
  # ==========================================
  marketing-os:
    build:
      context: ./apps/marketing-os
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
    restart: always

  # ==========================================
  # Inventory Intelligence (Port 5003)
  # ==========================================
  inventory-intel:
    build:
      context: ./apps/inventory-intel
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      - NODE_ENV=production
    restart: always

  # ==========================================
  # Odoo ERP Integration (Port 5004)
  # ==========================================
  odoo-integration:
    build:
      context: ./apps/odoo-integration
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - NODE_ENV=production
    restart: always

  # ==========================================
  # n8n Workflow Automation Engine (Port 5678)
  # ==========================================
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=https://desktop-l3an0ma.tail2141f7.ts.net/
      - N8N_EDITOR_BASE_URL=https://desktop-l3an0ma.tail2141f7.ts.net/
      - N8N_TRUST_PROXY=true
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

volumes:
  n8n_data:
