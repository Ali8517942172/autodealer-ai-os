version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      
      # Database setup pointing to mock Supabase Postgres
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=supabase-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=ai_os_db
      - DB_POSTGRESDB_USER=ai_admin
      - DB_POSTGRESDB_PASSWORD=ai_secure_password
      
      # Queue setup (using Redis)
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_HEALTH_CHECK_ACTIVE=true
    depends_on:
      supabase-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

  n8n-worker:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-worker
    restart: unless-stopped
    command: worker
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=supabase-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=ai_os_db
      - DB_POSTGRESDB_USER=ai_admin
      - DB_POSTGRESDB_PASSWORD=ai_secure_password
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
    depends_on:
      supabase-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  supabase-postgres:
    # Using pgvector to act as a mock Supabase for AI applications
    image: pgvector/pgvector:pg15
    container_name: supabase-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ai_admin
      - POSTGRES_PASSWORD=ai_secure_password
      - POSTGRES_DB=ai_os_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_admin -d ai_os_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
  postgres_data:
  redis_data:
